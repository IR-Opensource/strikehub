name: CI

on:
  workflow_dispatch:
  push:

permissions:
  contents: read
  checks: write

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      # ============= InvisiRisk Setup =============
      - name: Setup PSE
        uses: invisirisk/pse-action@develop
        with:
          api_url: "https://app.stage.invisirisk.com"
          app_token: ${{secrets.IR_API_KEY}}
      # ============= InvisiRisk Setup End =============
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --no-default-features --features desktop -p sh-ui -p sh-core -- -D warnings

  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    steps:
      # ============= InvisiRisk Setup =============
      - name: Setup PSE
        uses: invisirisk/pse-action@develop
        with:
          api_url: "https://app.stage.invisirisk.com"
          app_token: ${{secrets.IR_API_KEY}}
      # ============= InvisiRisk Setup End =============
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --bin strikehub-server --features server --no-default-features -p sh-ui


  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      # ============= InvisiRisk Setup =============
      - name: Setup PSE
        uses: invisirisk/pse-action@develop
        with:
          api_url: "https://app.stage.invisirisk.com"
          app_token: ${{secrets.IR_API_KEY}}
          mode: sidecar
          pse_image_tag: dev-test
      # ============= InvisiRisk Setup End =============
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          build-args: |
            BUILDKIT=1
            BUILDKIT_SYNTAX=public.ecr.aws/w3c0c0n7/invisirisk/baf-buildkit:latest
            PSE_PROXY=http://${{ env.PSE_PROXY_IP }}:3128
          secret-files: |
            pse-ca=${{env.PSE_CA_CERT_PATH}}
            
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT=1
            BUILDKIT_SYNTAX=public.ecr.aws/w3c0c0n7/invisirisk/baf-buildkit:latest
            PSE_PROXY=http://${{ env.PSE_PROXY_IP }}:3128
          secret-files: |
            pse-ca=${{env.PSE_CA_CERT_PATH}}


  
